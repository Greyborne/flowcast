services:
  # ── Backend: Express.js API + WebSocket server ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowcast-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: file:/data/flowcast.db
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      WS_PORT: 3001
    volumes:
      - ./backend/src:/app/src
      - flowcast-data:/data
    command: npm run dev
    networks:
      - flowcast-network
    restart: unless-stopped

  # ── Frontend: React + Vite dev server ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowcast-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001/ws
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev
    networks:
      - flowcast-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  flowcast-network:
    driver: bridge

volumes:
  flowcast-data:
    driver: local
